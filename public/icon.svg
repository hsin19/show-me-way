<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#1b1d30"/>
      <stop offset="100%" stop-color="#0a0b10"/>
    </radialGradient>
    
    <!-- Neon Gradients -->
    <linearGradient id="neonPink" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff2a74"/>
      <stop offset="100%" stop-color="#ff0055"/>
    </linearGradient>
    <linearGradient id="neonBlue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00ffff"/>
      <stop offset="100%" stop-color="#00a2ff"/>
    </linearGradient>
    <linearGradient id="neonPurple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#9d4edd"/>
      <stop offset="100%" stop-color="#6a0dad"/>
    </linearGradient>
    
    <!-- Drop Shadow Glows -->
    <filter id="glowPink" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <filter id="glowBlue" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Base Circle Background -->
  <circle cx="256" cy="256" r="240" fill="url(#bgGrad)" stroke="#1a1c2b" stroke-width="8"/>

  <!-- Glowing Outer Neon Ring -->
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#neonBlue)" stroke-width="4" opacity="0.3" filter="url(#glowBlue)"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="url(#neonPink)" stroke-width="2" stroke-dasharray="100 40 200 40" filter="url(#glowPink)"/>

  <!-- Korean Traditional Roof / Gate Silhouette (Gyeongbokgung style) -->
  <path d="M 120 340 L 150 310 L 362 310 L 392 340 Z" fill="url(#neonPurple)" opacity="0.4"/>
  <path d="M 130 330 Q 256 290 382 330 L 362 310 Q 256 280 150 310 Z" fill="url(#neonBlue)" filter="url(#glowBlue)"/>
  
  <!-- Gyeongbokgung Pillars -->
  <rect x="180" y="330" width="16" height="60" fill="url(#neonPurple)" rx="2"/>
  <rect x="248" y="330" width="16" height="60" fill="url(#neonPurple)" rx="2"/>
  <rect x="316" y="330" width="16" height="60" fill="url(#neonPurple)" rx="2"/>
  
  <!-- Base Ground Line -->
  <rect x="100" y="380" width="312" height="15" fill="url(#neonPink)" rx="4" filter="url(#glowPink)"/>

  <!-- Tower Silhouette (N Seoul Tower) -->
  <!-- Legs -->
  <path d="M 236 380 L 250 220 L 262 220 L 276 380 Z" fill="url(#neonPurple)" opacity="0.5"/>
  <!-- Body & Spire -->
  <rect x="252" y="140" width="8" height="85" fill="url(#neonBlue)" filter="url(#glowBlue)"/>
  <!-- Observatory Deck (Circle) -->
  <ellipse cx="256" cy="180" rx="22" ry="12" fill="url(#neonPink)" filter="url(#glowPink)"/>
  <ellipse cx="256" cy="180" rx="14" ry="4" fill="#ffffff"/>
  <!-- Top Spire Light -->
  <line x1="256" y1="140" x2="256" y2="80" stroke="url(#neonBlue)" stroke-width="3" filter="url(#glowBlue)"/>
  <circle cx="256" cy="80" r="6" fill="#ffffff" filter="url(#glowBlue)"/>

  <!-- Stylized Clouds (Korean Traditional style) -->
  <path d="M 80 180 Q 110 160 140 180 Q 160 160 180 180 L 80 180 Z" fill="#ffffff" opacity="0.1"/>
  <path d="M 340 240 Q 365 225 390 240 Q 405 225 420 240 L 340 240 Z" fill="#ffffff" opacity="0.1"/>

  <!-- Decorative text (Korean representation) -->
  <text x="256" y="445" font-family="'Plus Jakarta Sans', sans-serif" font-size="34" font-weight="800" fill="#ffffff" text-anchor="middle" letter-spacing="8">🧭 SHOWMEWAY</text>
  <text x="256" y="480" font-family="'Noto Sans TC', sans-serif" font-size="16" font-weight="600" fill="url(#neonBlue)" text-anchor="middle" letter-spacing="4">下面一位</text>
</svg>
